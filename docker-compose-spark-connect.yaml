services:
  spark-connect:
    image: apache/spark:3.5.1
    container_name: spark-connect
    ports:
      - 15002:15002
      - 4042:4042
    volumes:
      - ./data:/opt/data
      # - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./spark/jars/postgresql-42.7.3.jar:/opt/spark/jars/postgresql-42.7.3.jar
      - ./spark/jars/clickhouse-jdbc-0.9.8-all.jar:/opt/spark/jars/clickhouse-jdbc-0.9.8-all.jar
      - ./spark/jars/trino-jdbc-472.jar:/opt/spark/jars/trino-jdbc-472.jar
      - ./spark/jars/hadoop-aws-3.3.4.jar:/opt/spark/jars/hadoop-aws-3.3.4.jar
      - ./spark/jars/aws-java-sdk-bundle-1.12.262.jar:/opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar
      - ./spark/jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar:/opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar
      - ./spark/jars/aws-crt-client-2.20.160.jar:/opt/spark/jars/aws-crt-client-2.20.160.jar
      - ./spark/jars/bundle-2.20.160.jar:/opt/spark/jars/bundle-2.20.160.jar
      - ./spark/jars/spark-connect_2.12-3.5.1.jar:/opt/spark/jars/spark-connect_2.12-3.5.1.jar
    command: >
      /opt/spark/bin/spark-submit
      --conf "spark.driver.extraJavaOptions=-Divy.home=/tmp/.ivy"
      --conf "spark.ui.port=4042"
      --class org.apache.spark.sql.connect.service.SparkConnectServer
      --master spark://spark-master:7077
      spark-internal
    networks:
      - lakehouse

networks:
  lakehouse:
    name: lakehouse
    driver: bridge
